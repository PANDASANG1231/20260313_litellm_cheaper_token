# LiteLLM config — DeepSeek only
# Usage: litellm --config config.deepseek.yaml
#
# 启动后将 ANTHROPIC_BASE_URL 指向 http://localhost:4000
# Claude Code 会把请求发到这里，LiteLLM 路由到 DeepSeek API

model_list:
  - model_name: claude-opus-4-6
    litellm_params:
      model: openai/deepseek-reasoner
      api_base: https://api.deepseek.com
      api_key: os.environ/DEEPSEEK_API_KEY
    model_info:
      max_output_tokens: 8192

  - model_name: claude-sonnet-4-6
    litellm_params:
      model: openai/deepseek-chat
      api_base: https://api.deepseek.com
      api_key: os.environ/DEEPSEEK_API_KEY
    model_info:
      max_output_tokens: 8192

  - model_name: claude-haiku-4-5-20251001
    litellm_params:
      model: openai/deepseek-chat
      api_base: https://api.deepseek.com
      api_key: os.environ/DEEPSEEK_API_KEY
    model_info:
      max_output_tokens: 8192

  - model_name: claude-haiku-4-5
    litellm_params:
      model: openai/deepseek-chat
      api_base: https://api.deepseek.com
      api_key: os.environ/DEEPSEEK_API_KEY
    model_info:
      max_output_tokens: 8192

litellm_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  modify_params: true
  drop_params: true
  num_retries: 2
  retry_after: 30
  request_timeout: 600
  # Route /v1/messages through chat/completions instead of Responses API.
  # Required for providers that don't support the Responses API (e.g. DeepSeek).
  use_chat_completions_url_for_anthropic_messages: true

router_settings:
  enable_pre_call_checks: true
